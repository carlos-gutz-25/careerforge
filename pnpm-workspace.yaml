packages:
  - apps/*
  - packages/*

allowBuilds:
  # drizzle-kit's bundler. Its postinstall only swaps in a faster binary shim;
  # the platform binary itself is an optionalDependency, so scripts stay off.
  esbuild: false
  unrs-resolver: false

# Single source of truth for tool versions shared across workspaces (pnpm catalogs).
catalog:
  '@types/node': ^24.0.0 # match .nvmrc major
  typescript: ^5.9.0
  vitest: ^4.0.0
  zod: ^4.1.0
