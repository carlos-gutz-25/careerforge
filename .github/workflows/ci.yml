name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, lint]
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable # pnpm resolves to the packageManager pin in package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ${{ matrix.task }}

  # The portfolio (apps/portfolio) must build statically on every PR, so a
  # broken SSG build blocks merge and main stays releasable. Builds the single
  # shipped shape: plain `generate` at the apex root `/` (custom domain
  # carlosgutz.com; ADR-0008 amended 2026-07-20, M2-11). deploy.yml invokes the
  # same `generate` script, so the tested and deployed output cannot drift (one
  # source of truth, package.json). [M2-11: the `/careerforge/` subpath build is
  # gone — the site serves from the apex root, so only that shape is built.]
  portfolio-build:
    name: portfolio-build
    runs-on: ubuntu-latest
    steps:
      # Full history (fetch-depth: 0) so the case-study content gate can resolve
      # SHA citations (git cat-file). Small repo, seconds. The validator's
      # shallow-checkout guard exits 2 if this line is ever dropped while SHA
      # citations exist — accidental removal goes loudly RED, never silently
      # ungated (M2-04).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: corepack enable # pnpm resolves to the packageManager pin in package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Case-study content gate (M2-04, ADR-0010): source-level, browser-free,
      # zero deps — runs BEFORE generate so a schema-violating case study fails
      # before the job pays for the build or Chrome. @nuxt/content validates
      # nothing at ingest, so this deterministic script is the whole enforcer.
      - name: case-study content gate
        run: node apps/portfolio/scripts/validate-case-studies.mjs
      # Build the shipped shape once (apex root `/`) — the byte-identical output
      # deploy.yml publishes (H-2) — then run every quality gate against it.
      # M2-03 closed the asset-resolution class the M2-11 cutover exposed:
      # assert-prerender is structural HTML only (parses no href/src), so the
      # internal-link check now catches a base-URL/asset-404 regression, and the
      # Lighthouse + axe budgets gate perf/a11y/best-practices/SEO. COVERAGE
      # BOUNDARY (F-2): the Lighthouse budgets, axe, and link check audit `/`
      # (home) ONLY — the single content page today; the 200.html/404.html SPA
      # fallbacks are NOT gated; extend when a 2nd page lands (S3-2).
      - run: pnpm --filter @careerforge-app/portfolio generate
      - run: node apps/portfolio/scripts/assert-prerender.mjs apps/portfolio/.output/public/index.html
      # Every prerendered case-study page must carry a valid honesty label
      # (data-provenance ∈ the three tokens + a visible "Provenance:" label +
      # a single <h1>). Structural HTML only; browser-free (M2-05).
      - run: node apps/portfolio/scripts/assert-provenance.mjs apps/portfolio/.output/public/case-studies
      # Internal link + asset check FIRST: browser-free and fast, so a broken
      # asset path fails before the job pays for Chrome.
      - name: internal link check
        run: pnpm --filter @careerforge-app/portfolio link-check
      # Chrome for the Lighthouse + axe gates: install the PINNED Playwright
      # chromium (reproducible scores — the runner's rolling system Chrome would
      # drift the budgets) and share it via CHROME_PATH. Same cache key as the
      # `test` job. COUPLING: the browser is installed via apps/web's playwright
      # and the path resolved via apps/portfolio's playwright-core — BOTH pinned
      # ^1.61.1; a future version split would break this resolve.
      - id: playwright-version
        run: echo "version=$(pnpm --filter @careerforge-app/web exec playwright --version | sed 's/[^0-9.]//g')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: pnpm --filter @careerforge-app/web exec playwright install --with-deps chromium
      - name: resolve CHROME_PATH
        run: |
          CHROME_PATH=$(cd apps/portfolio && node -e 'console.log(require("playwright-core").chromium.executablePath())')
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
      - name: lighthouse budgets
        run: pnpm --filter @careerforge-app/portfolio lighthouse
      - name: axe a11y
        run: pnpm --filter @careerforge-app/portfolio axe

  # Split from the matrix so only tests pay for a Postgres container. The job
  # name must stay `test` — it's a required check in the default-branch ruleset.
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          # CI-only throwaway credentials, unrelated to any real environment.
          POSTGRES_USER: careerforge
          POSTGRES_PASSWORD: careerforge-ci
          POSTGRES_DB: careerforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careerforge -d careerforge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # The db test setup derives careerforge_test from this, creates it, and
      # runs the checked-in migrations itself — no extra steps here.
      DATABASE_URL: postgres://careerforge:careerforge-ci@localhost:5432/careerforge
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable # pnpm resolves to the packageManager pin in package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      # Playwright e2e (M1-02) runs INSIDE this job on purpose: the check
      # name `test` is required by the default-branch ruleset, so e2e failures block
      # merges with zero ruleset changes. Ledger records the split trigger
      # (>~5 specs or >3 min added here → own job/check). Browsers are cached
      # on the playwright version; retries are CI-only (playwright.config.ts).
      - id: playwright-version
        run: echo "version=$(pnpm --filter @careerforge-app/web exec playwright --version | sed 's/[^0-9.]//g')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: pnpm --filter @careerforge-app/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
